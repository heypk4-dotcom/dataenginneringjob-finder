version: '3.8'

services:
  job_hunter:
    build: .
    container_name: de_job_hunter
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    restart: always

  dashboard:
    build: .
    container_name: de_job_dashboard
    env_file:
      - .env
    command: streamlit run job_hunter/dashboard/app.py --server.port=8501 --server.address=0.0.0.0
    ports:
      - "8501:8501"
    volumes:
      - ./data:/app/data
    restart: always
